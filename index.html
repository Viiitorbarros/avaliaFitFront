<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AvaliaFit Pro - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; }
        .card-login { max-width: 400px; width: 100%; border-radius: 15px; }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">
    <div class="card card-login shadow-lg border-0">
        <div class="card-body p-5">
            <h2 class="text-center fw-bold mb-4" style="color: #08700f;">AvaliaFit Pro</h2>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <input type="text" id="login" class="form-control" required placeholder="Digite seu usuário">
                </div>
                <div class="mb-4">
                    <label class="form-label">Senha</label>
                    <input type="password" id="password" class="form-control" required placeholder="Digite sua senha">
                </div>
                <button type="submit"
                class="btn w-100 py-2 fw-bold"
                style="background-color: #08700f; border-color: #08700f; color: white;">
                Entrar
                </button>
            </form>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Vincula o formulário à função de login do auth.js
        document.getElementById('loginForm').addEventListener('submit', realizarLogin);
    </script>
</body>
</html>
