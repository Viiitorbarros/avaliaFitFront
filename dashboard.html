<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AvaliaFit Pro - Painel</title>

    <meta name="theme-color" content="#08700f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="main-header shadow-sm">
    <h1 class="h4 mb-0 fw-bold">AvaliaFit Pro</h1>
    <button onclick="logout()" class="btn btn-sm btn-outline-light">
        <i class="bi bi-box-arrow-right"></i> <span class="d-none d-md-inline">Sair</span>
    </button>
</header>

<div class="main-container d-flex">

    <nav class="main-sidebar p-2 p-md-3">
        <div class="nav nav-pills flex-column flex-md-column flex-row justify-content-around">
            <a class="nav-link active" data-section="inicio">
                <i class="bi bi-house-door me-1 me-md-2"></i> Início
            </a>
            <a class="nav-link" data-section="cliente">
                <i class="bi bi-people me-1 me-md-2"></i> <span class="d-inline d-md-inline">Clientes</span>
            </a>
            <a class="nav-link" data-section="agendamento">
                <i class="bi bi-calendar-event me-1 me-md-2"></i> <span class="d-inline d-md-inline">Agenda</span>
            </a>
        </div>
    </nav>

    <main class="flex-grow-1">
        <div id="content-area" class="p-3 p-md-4">
            </div>
    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/cliente.js"></script>
<script src="js/avaliacao.js"></script>
<script src="js/agendamento.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
